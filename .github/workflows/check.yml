on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '調査対象URL'
        required: true
      browsers:
        description: '実行ブラウザ (カンマ区切り: chromium,firefox,webkit)'
        required: true
        default: 'chromium'
      take_screenshot:
        description: 'スクリーンショットを撮るか (true/false)'
        required: true
        default: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright Tests
        run: npx playwright test tests/save-result.spec.js --retries=0 --config=/dev/null
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          CHOSEN_BROWSERS: ${{ github.event.inputs.browsers }}
          TAKE_SCREENSHOT: ${{ github.event.inputs.take_screenshot }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}